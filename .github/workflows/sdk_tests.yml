name: SDK Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  sdk-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zk/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run SDK tests
        run: npm test
